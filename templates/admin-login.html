{% set page_title = "Admin Login — Karanvir Prihar" %}
{% set page_description = "Admin sign-in." %}
{% include "header.html" %}
  <div class="wrap page-wrap" style="max-width:420px;">
    <a class="back-link" href="{{ url_for('home') }}">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Back to home
    </a>

    <div class="page-head">
      <span class="eyebrow">Admin</span>
      <h1>Sign in</h1>
    </div>

    <div class="contact-card">
      {% if error %}<p class="form-note show error">{{ error }}</p>{% endif %}
      <form method="post">
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autofocus>
        </div>
        <div class="field">
          <label for="code">Authenticator code</label>
          <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]*" maxlength="6" required>
        </div>
        <button class="btn-submit" type="submit">Log in</button>
      </form>
    </div>
  </div>
{% include "footer.html" %}
